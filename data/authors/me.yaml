bio: |
  I am current a fourth-year Ph.D. student (Sep. 2022 - Jun. 2027, expected) in the School of Information Science and Technology, Fudan University, supervised by Prof. [Tao Chen](https://eetchen.github.io/). Before this, I obtained my Bachelor's degree in Electronic Engineering also from Fudan University (Sep. 2018 - Jun. 2022). I'm currently working in the fields of agentic model, multi-agent system, and multi-modal large language models. My research pursues to develop AI systems that can understand, reason, and interact with the real world.

